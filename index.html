<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24 Hour Memory</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --dim: #64748b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; min-height: 100vh; }
        h1 { color: #38bdf8; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; text-align: center; }
        .container { width: 100%; max-width: 400px; }
        #taskInput { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #334155; background: var(--card); color: white; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .task-item { background: var(--card); margin-bottom: 12px; border-radius: 12px; display: flex; align-items: center; border-left: 5px solid var(--item-color); transition: all 0.5s ease; overflow: hidden; }
        .task-content { flex-grow: 1; padding: 15px; cursor: pointer; min-width: 0; }
        .task-text { display: block; font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .completed { opacity: 0.3; filter: grayscale(1); }
        
        .action-btn { padding: 15px; color: var(--dim); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .refresh-btn { font-size: 1.2rem; }
        .delete-btn { font-size: 1.5rem; }
        
        .time-left { font-size: 0.75rem; color: var(--item-color); font-weight: bold; }
        .count { margin-bottom: 8px; font-size: 0.85rem; color: var(--dim); text-align: right; }
    </style>
</head>
<body>
    <h1>24 Hour Memory</h1>
    <div class="container">
        <div class="count" id="taskCount">0 / 5</div>
        <input type="text" id="taskInput" placeholder="Enter a memory..." maxlength="50">
        <div id="taskList"></div>
    </div>
    <script>
        const input = document.getElementById('taskInput');
        const listContainer = document.getElementById('taskList');
        const countDisplay = document.getElementById('taskCount');
        let tasks = JSON.parse(localStorage.getItem('ephemeralTasks')) || [];

        function getColor(hoursLeft) {
            if (hoursLeft > 20) return '#22d3ee'; // Cyan
            if (hoursLeft > 16) return '#4ade80'; // Green
            if (hoursLeft > 12) return '#facc15'; // Yellow
            if (hoursLeft > 8)  return '#fb923c'; // Orange
            if (hoursLeft > 4)  return '#f87171'; // Light Red
            return '#ef4444'; // Deep Red
        }

        function updateUI() {
            const now = Date.now();
            tasks = tasks.filter(t => (now - t.createdAt) < 86400000);
            localStorage.setItem('ephemeralTasks', JSON.stringify(tasks));
            
            listContainer.innerHTML = '';
            tasks.forEach((task, i) => {
                const msLeft = 86400000 - (now - task.createdAt);
                const h = Math.max(0, Math.floor(msLeft / 3600000));
                const m = Math.max(0, Math.floor((msLeft / 60000) % 60));
                const color = getColor(h);
                
                const item = document.createElement('div');
                item.className = `task-item ${task.completed ? 'completed' : ''}`;
                item.style.setProperty('--item-color', color);
                item.innerHTML = `
                    <div class="task-content" onclick="toggleTask(${i})">
                        <span class="task-text">${task.text}</span>
                        <span class="time-left">${h}h ${m}m remaining</span>
                    </div>
                    <div class="action-btn refresh-btn" onclick="resetTask(${i})">↻</div>
                    <div class="action-btn delete-btn" onclick="deleteTask(${i})">&times;</div>`;
                listContainer.appendChild(item);
            });
            countDisplay.innerText = `${tasks.length} / 5`;
            input.style.display = tasks.length >= 5 ? 'none' : 'block';
        }

        function addTask(text) {
            if (tasks.length < 5 && text.trim()) {
                tasks.push({ text: text, createdAt: Date.now(), completed: false });
                updateUI();
            }
        }

        window.toggleTask = (i) => { tasks[i].completed = !tasks[i].completed; updateUI(); };
        window.deleteTask = (i) => { tasks.splice(i, 1); updateUI(); };
        window.resetTask = (i) => { tasks[i].createdAt = Date.now(); updateUI(); };

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') { addTask(input.value); input.value = ''; } });
        setInterval(updateUI, 30000); // Update every 30s for smoother color feel
        updateUI();
    </script>
</body>
</html>
