<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Today</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --dim: #64748b;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 { 
            color: var(--accent); 
            font-weight: 300; 
            letter-spacing: 3px; 
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
        }
        
        #taskInput {
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid #334155;
            background: var(--card); 
            color: white; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            font-size: 16px; /* Prevents iOS zoom on focus */
            outline: none;
            transition: border-color 0.2s;
        }

        #taskInput:focus {
            border-color: var(--accent);
        }
        
        .task-item {
            background: var(--card);
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            border-left: 4px solid var(--accent);
            animation: slideIn 0.3s ease-out;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-content {
            flex-grow: 1;
            padding: 15px;
            cursor: pointer;
            user-select: none;
        }

        .task-text {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .time-left { 
            font-size: 0.75rem;
