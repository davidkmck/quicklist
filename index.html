<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h Focus</title>
    <style>
        body {
            background: #0f172a; color: #f8fafc;
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; padding-top: 50px; margin: 0;
        }
        h1 { color: #38bdf8; font-weight: 300; letter-spacing: 2px; }
        .container { width: 90%; max-width: 400px; }
        
        #taskInput {
            width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #334155;
            background: #1e293b; color: white; margin-bottom: 20px; box-sizing: border-box;
        }
        
        .task-item {
            background: #1e293b; padding: 15px; border-radius: 8px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; border-left: 4px solid #38bdf8;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } }

        .time-left { font-size: 0.7rem; color: #64748b; }
        .count { margin-bottom: 10px; font-size: 0.8rem; color: #94a3b8; text-align: right; }
        button#addBtn { display: none; } /* We'll use Enter key */
    </style>
</head>
<body>

    <h1>TODAY</h1>
    
    <div class="container">
        <div class="count" id="taskCount">0 / 5 Items</div>
        <input type="text" id="taskInput" placeholder="What needs doing?" maxlength="50">
        <div id="taskList"></div>
    </div>

    <script>
        const input = document.getElementById('taskInput');
        const listContainer = document.getElementById('taskList');
        const countDisplay = document.getElementById('taskCount');

        let tasks = JSON.parse(localStorage.getItem('ephemeralTasks')) || [];

        function updateUI() {
            // 1. Filter out tasks older than 24 hours
            const now = Date.now();
            tasks = tasks.filter(task => (now - task.createdAt) < (24 * 60 * 60 * 1000));
            
            // 2. Save back to storage
            localStorage.setItem('ephemeralTasks', JSON.stringify(tasks));

            // 3. Render
            listContainer.innerHTML = '';
            tasks.forEach((task, index) => {
                const hoursLeft = Math.round((24 - (now - task.createdAt) / (1000 * 60 * 60)));
                
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <span>${task.text}</span>
                    <span class="time-left">~${hoursLeft}h left</span>
                `;
                item.onclick = () => deleteTask(index);
                listContainer.appendChild(item);
            });

            countDisplay.innerText = `${tasks.length} / 5 Items`;
            input.style.display = tasks.length >= 5 ? 'none' : 'block';
        }

        function addTask(text) {
            if (tasks.length < 5 && text.trim() !== '') {
                tasks.push({
                    text: text,
                    createdAt: Date.now()
                });
                updateUI();
            }
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            updateUI();
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask(input.value);
                input.value = '';
            }
        });

        // Auto-refresh every minute to check for expired tasks
        setInterval(updateUI, 60000);
        
        // Initial load
        updateUI();
    </script>
</body>
</html>
