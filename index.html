<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24 Hour Memory</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22d3ee; --dim: #64748b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        h1 { color: var(--accent); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0; }
        
        .input-container { width: 100%; max-width: 340px; margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; outline: none; font-size: 1rem; }
        button { background: var(--accent); color: var(--bg); border: none; border-radius: 12px; padding: 12px 20px; font-weight: bold; cursor: pointer; }

        .list { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 10px; }
        .item { background: var(--card); padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.3s ease; border-left: 4px solid var(--accent); }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .item-text { flex: 1; margin-right: 10px; }
        .time { font-size: 0.6rem; color: var(--dim); display: block; margin-top: 4px; }
        .delete-btn { color: var(--dim); background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }
        
        /* Urgency Colors */
        .urgent { border-left-color: #f43f5e; } /* Red for items > 20h old */
    </style>
</head>
<body>

    <h1>24 Hour Memory</h1>

    <div class="input-container">
        <input type="text" id="taskInput" placeholder="Add a memory..." autocomplete="off">
        <button onclick="addItem()">Add</button>
    </div>

    <div id="taskList" class="list"></div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('memoryTasks')) || [];
        const input = document.getElementById('taskInput');
        const list = document.getElementById('taskList');

        function addItem() {
            if (!input.value.trim()) return;
            
            const newTask = {
                id: Date.now(),
                text: input.value,
                timestamp: new Date().getTime()
            };

            // This is the change: unshift puts it at the beginning
            tasks.unshift(newTask);
            input.value = '';
            saveAndRender();
        }

        // Allow Enter key to add item
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            // Filter out items older than 24 hours automatically
            const now = new Date().getTime();
            tasks = tasks.filter(t => now - t.timestamp < 24 * 60 * 60 * 1000);
            
            localStorage.setItem('memoryTasks', JSON.stringify(tasks));
            
            list.innerHTML = '';
            tasks.forEach(task => {
                const ageHours = (now - task.timestamp) / (1000 * 60 * 60);
                const item = document.createElement('div');
                item.className = `item ${ageHours > 20 ? 'urgent' : ''}`;
                
                const timeStr = new Date(task.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                item.innerHTML = `
                    <div class="details">
                        <div class="item-text">${task.text}</div>
                        <span class="time">${timeStr}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">×</button>
                `;
                list.appendChild(item);
            });
        }

        // Run cleanup/render every minute to handle the 24h expiration
        setInterval(saveAndRender, 60000);
        saveAndRender();
    </script>
</body>
</html>
